<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SUPER BINGO</title>

<style>
#bingoEffect {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  
  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 120px;
  font-weight: 900;
  color: white;
  letter-spacing:8px;

  text-shadow:4px 4px 10px black;

  background: rgba(0,0,0,0.75);

  opacity: 0;
  pointer-events: none;

  transition: 0.3s;
  z-index: 9999;
}

#bingoEffect.show {
  opacity: 1;
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(6px,-6px); }
  50% { transform: translate(-6px,6px); }
  75% { transform: translate(6px,6px); }
  100% { transform: translate(0,0); }
}

body{
  margin:0;
  font-family:Arial;
  background:#0f1220;
  color:white;
  text-align:center;
}
h1{margin:10px;}

/* 점수판 */
#layout{

    width:95%;
    max-width:1600px;

    margin:30px auto;

    display:grid;

    grid-template-columns:240px 1fr 240px;

    column-gap:40px;

    align-items:start;

}

#scoreboard{

    width:180px;

    background:#1c2140;

    padding:20px;

    border-radius:10px;

    font-size:20px;

}

.team{

    margin:20px 0;

    text-align:left;

    font-weight:bold;

}

#board{
  display:grid;
  grid-template-columns:repeat(5,90px);
  gap:6px;
  justify-content:center;
  align-self:flex-start;
}

.cell{
  width:90px;
  height:90px;
  background:#222a55;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  cursor:pointer;
  font-size:40px;
  font-weight:bold;
}

.red{background:#ff4d4d!important;}
.blue{background:#4da6ff!important;}
.green{background:#4dff88!important;}
.yellow{background:#ffe44d!important;color:black;}

/* 패널 */
#panel{

  background:#1c2140;

  padding:15px;

  border-radius:10px;

  width:220px;

  display:none;

}

button{

    margin:5px;

    padding:12px;

    font-size:20px;

    font-weight:bold;

    border:none;

    border-radius:10px;

    cursor:pointer;
  
    transition:all .2s;

    box-shadow:0 4px 8px rgba(0,0,0,.4);
  

}
  button:hover{

    transform:scale(1.08);

    filter:brightness(1.1);

}

button:active{

    transform:scale(.95);

}
  .teamButtons{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

    margin-top:10px;

}

.etcButtons{

    display:flex;

    flex-direction:column;

    gap:10px;

    margin-top:15px;

}
  .redBtn{

    background:linear-gradient(#ff6767,#d62424);

    color:white;

}

.blueBtn{

    background:linear-gradient(#69b8ff,#2d7fff);

    color:white;

}

.greenBtn{

    background:linear-gradient(#6df5a0,#28b85f);

    color:white;

}

.yellowBtn{

    background:linear-gradient(#fff176,#ffd93d);

    color:black;

}

.clearBtn{

    background:#666;

    color:white;

}

.closeBtn{

    background:#222;

    color:white;

}

  
/* 미니게임 공개창 */
#miniBox{

  margin:20px 0;

  padding:20px;

  background:#0f1220;

  border-radius:10px;

  display:none;

  font-size:28px;

  font-weight:bold;

  color:#ffe44d;

  text-align:center;

}
#miniEffect{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:rgba(0,0,0,0.85);

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  opacity:0;

  pointer-events:none;

  transition:opacity .4s;

  z-index:9998;

}

#miniEffect.show{

  opacity:1;

}

#miniTitle{

  font-size:60px;

  color:white;

  margin-bottom:20px;

  font-weight:bold;

  letter-spacing:3px;

}

#miniGameName{

  font-size:88px;

  font-weight:900;

  color:white;

  text-align:center;

  letter-spacing:3px;

  text-shadow:
      3px 3px 6px rgba(0,0,0,.7);

  animation:pop .5s;

}

@keyframes pop{

  0%{
    transform:scale(.3);
    opacity:0;
  }

  60%{
    transform:scale(1.15);
  }

  100%{
    transform:scale(1);
    opacity:1;
  }

}

  
</style>
</head>

<body>
<div id="bingoEffect">BINGO!</div>
  <div id="miniEffect">
    <div id="miniTitle">🎯 미니게임</div>
    <div id="miniGameName"></div>
</div>

<h1>🎮 SUPER BINGO</h1>

<div id="layout">

    <!-- 왼쪽 점수판 -->
    <div id="scoreboard">

        <div class="team">🔴 레드 : <span id="red">0</span></div>
        <div class="team">🔵 블루 : <span id="blue">0</span></div>
        <div class="team">🟢 그린 : <span id="green">0</span></div>
        <div class="team">🟡 옐로우 : <span id="yellow">0</span></div>

    </div>

    <!-- 가운데 빙고판 -->
    <div id="board"></div>

<!-- 사회자 패널 -->
<div id="panel">
  <div id="cellInfo"></div>

  <div id="miniBox">
    🎯 미니게임: <span id="miniText"></span>
  </div>

  <button onclick="showMiniGame()">미니게임 공개</button>

  <hr>

<div class="teamButtons">

    <button class="redBtn" onclick="setTeam('red')">레드</button>

    <button class="blueBtn" onclick="setTeam('blue')">블루</button>

    <button class="greenBtn" onclick="setTeam('green')">그린</button>

    <button class="yellowBtn" onclick="setTeam('yellow')">옐로우</button>

</div>

<hr>

<div class="etcButtons">

    <button class="clearBtn" onclick="clearCell()">빈칸</button>

    <button class="closeBtn" onclick="closePanel()">닫기</button>

</div>
</div>
</div>

<script>
function showBingoEffect(team){
  const el = document.getElementById("bingoEffect");

  el.innerHTML = "🏆<br>BINGO!<br>" + team.toUpperCase();

  el.classList.add("show");

  setTimeout(()=>{
    el.classList.remove("show");
  }, 1200);
}
  function showMiniEffect(game){

    const effect = document.getElementById("miniEffect");

    document.getElementById("miniGameName").innerText = game;

    effect.classList.add("show");

    setTimeout(function(){

        effect.classList.remove("show");

    },2500);

}
const board=document.getElementById("board");
const panel=document.getElementById("panel");

let selectedCell=null;

let scores={
  red:0,
  blue:0,
  green:0,
  yellow:0
};

/* 🔥 미니게임 (숨김) */
let miniGames=[
"5. 눈치게임","14. 5초 안에 말하기","3. 초성게임","8. 스쿼트","4. 팔씨름",
"11. 줄세우기","13. 이어그리기","5. 눈치게임","9. 손바닥 치기","2. 물병 세우기",
"1. 플랭크","15. 마마마자로 끝나는 말은","가위바위보","6. 파파라치","13. 이어그리기",
"8. 스쿼트","16. 엄지씨름","14. 5초 안에 말하기","1. 플랭크","3. 초성게임",
"12. 컵쌓기","9. 손바닥 치기","6. 파파라치","10. 다리 찢기","7. 한발 서기"
];


  let previousBingo = new Set();

/* 생성 */
for(let r=0;r<5;r++){
  for(let c=0;c<5;c++){

    const i=r*5+c;
    const cell=document.createElement("div");
    cell.className="cell";

    cell.innerText=["A","B","C","D","E"][r]+(c+1);
    cell.dataset.index=i;

    cell.onclick=()=>openPanel(cell);

    board.appendChild(cell);
  }
}

/* 패널 열기 */
function openPanel(cell){

  selectedCell=cell;

  let owner = cell.dataset.owner;

  let teamName = "없음";

  if(owner=="red") teamName="🔴 레드";
  if(owner=="blue") teamName="🔵 블루";
  if(owner=="green") teamName="🟢 그린";
  if(owner=="yellow") teamName="🟡 옐로우";

  document.getElementById("cellInfo").innerHTML=
      "<h2>"+cell.innerText+"</h2>" +
      "<div style='font-size:20px;margin-top:10px;'>현재 팀 : <b>"+teamName+"</b></div>";

  document.getElementById("miniBox").style.display="none";

  panel.style.display="block";
}

/* 🔥 미니게임 공개 */
function showMiniGame(){

    if(!selectedCell) return;

    let i = selectedCell.dataset.index;

    let game = miniGames[i];

    // 오른쪽 패널에도 표시
    document.getElementById("miniText").innerText = game;
    document.getElementById("miniBox").style.display = "block";

    // 화면 중앙에 크게 표시
    showMiniEffect(game);

}

/* 팀 선택 */
/* 팀 선택 */
function setTeam(team){

  if(!selectedCell) return;

  let cell = selectedCell;

  cell.dataset.owner = team;
  cell.className = "cell " + team;

  recalculateScore();

  closePanel();
}

function clearCell(){

  if(!selectedCell) return;

  selectedCell.removeAttribute("data-owner");

  selectedCell.className="cell";

  recalculateScore();

  closePanel();
}

  
/* 닫기 */
function closePanel(){
  panel.style.display="none";
  selectedCell=null;
}

/* 점수 */
function updateScore(){
  red.innerText=scores.red;
  blue.innerText=scores.blue;
  green.innerText=scores.green;
  yellow.innerText=scores.yellow;
}
  
function recalculateScore(){

  // 점수 초기화
  scores={
    red:0,
    blue:0,
    green:0,
    yellow:0
  };


  // 칸 개수 계산
  const cells=document.querySelectorAll(".cell");

  cells.forEach(cell=>{

    let team=cell.dataset.owner;

    if(team){
      scores[team]++;
    }

  });

  // 빙고 다시 검사
  checkBingo();

  // 화면 갱신
  updateScore();

}
  
/* owner */
function owner(cell){
  return cell.dataset.owner;
}

/* 🔥 빙고 (총 7점 구조) */
function checkBingo(){

    const cells=document.querySelectorAll(".cell");

    let g=[];

    for(let r=0;r<5;r++){

        g[r]=[];

        for(let c=0;c<5;c++){

            g[r][c]=cells[r*5+c];

        }

    }

    // 이번에 완성된 빙고 저장
    let currentBingo=new Set();

    function win(team,key){

        currentBingo.add(key);

        // 이전에는 없었는데 이번에 새로 생긴 빙고
        if(!previousBingo.has(key)){

            showBingoEffect(team);

        }

        scores[team]+=2;

    }

    // 가로
    for(let r=0;r<5;r++){

        let t=owner(g[r][0]);

        if(t && g[r].every(x=>owner(x)===t)){

            win(t,"r"+r);

        }

    }

    // 세로
    for(let c=0;c<5;c++){

        let t=owner(g[0][c]);

        if(t && g.every(row=>owner(row[c])===t)){

            win(t,"c"+c);

        }

    }

    // 대각선
    let t1=owner(g[0][0]);

    if(t1 && [0,1,2,3,4].every(i=>owner(g[i][i])===t1)){

        win(t1,"d1");

    }

    let t2=owner(g[0][4]);

    if(t2 && [0,1,2,3,4].every(i=>owner(g[i][4-i])===t2)){

        win(t2,"d2");

    }

    // 이번 결과를 저장
    previousBingo=currentBingo;

}

</script>

</body>
</html>
